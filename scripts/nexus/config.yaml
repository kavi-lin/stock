  theme_detector_glob: "skills/theme-detector/cache/theme_detector_*.json"
  event_index: "reports/decision_review/event_index_latest.json"
  thesis_dir: "investment/invest_logs/theses"
  news_logs_glob: "news/news_logs/*_digest.json"
  break_news_dir: "news/break_news_logs"
  dashboard_data: "Dashboard/data.json"
  reports_dir: "reports"
  output: "Dashboard/nexus_graph.json"
  build_log_dir: "scripts/nexus/cache"
