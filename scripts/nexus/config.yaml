# Project Nexus V3.0 — knowledge graph build configuration
# Edit + bump VERSION minor when changing decay strategies or tier weights.
version: "3.0.0"

# Multi-dimensional decay (Gemini #1): different node/edge types have different inertia.
# Half-life in days for `weight * 0.5 ** (age_days / half_life)`.
decay_strategies:
  catalyst: 7              # earnings, FOMC, GTC — expire fast
  narrative: 21            # default theme/narrative lifespan
  theme: 21
  structural_shift: 90     # V2.18 long supercycles
  peer_of: 45              # industrial peer links shift quarterly
  supply_chain_hop: 45
  outcome_for: 30          # decision verdict edges
  belongs_to_theme: 21
  belongs_to_sector: 60
  mentioned_in: 14
  bull_case_for: 30
  bear_case_for: 30
  default: 21

# Tier confidence multipliers (Gemini #5)
# final_weight = (tier_confidence * raw_frequency) * decay_factor
tier_confidence:
  tier1: 1.0   # structured JSON
  tier2: 0.7   # regex
  tier3: 0.85  # LLM NER

# Pruning + size caps
min_edge_weight: 0.05
max_nodes: 800
max_json_bytes: 5000000      # 5MB hard cap
provisional_promotion_doc_count: 3   # LLM entity needs ≥3 distinct docs to promote

# Tier toggles
tiers_enabled:
  tier1: true
  tier2: true
  tier3: true

# Tier 3 LLM budget
tier3:
  model: "claude-haiku-4-5"
  backfill_limit: 10        # MDs per run (cap first-day cost spike)
  max_tokens: 1500
  window_tokens: 6000       # per MD slice
  since_days: 30            # only consider MDs within window
  api_key_env: "ANTHROPIC_API_KEY"

