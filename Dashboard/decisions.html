<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('dash_theme')||'dark';document.documentElement.setAttribute('data-theme',t);'dark'===t?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | 決策中心</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex min-h-screen transition-all" data-page="decisions">

    <!-- Sidebar (populated by UI.renderSidebar) -->
    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all"></aside>

    <!-- Main -->
    <main class="ml-64 flex-1 flex flex-col">
        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <i data-lucide="gavel" class="w-5 h-5 text-emerald-500"></i>
                <h2 class="text-lg font-bold" id="page-title">決策中心</h2>
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden sm:block" id="page-subtitle">Decisions</span>
            </div>
            <div class="flex items-center gap-4">
                <!-- Refresh countdown ring -->
                <div id="refresh-status" class="relative w-9 h-9 cursor-help shrink-0" title="Refresh status loading...">
                    <svg class="w-9 h-9 -rotate-90" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-200 dark:text-zinc-800"/>
                        <circle id="refresh-ring" cx="18" cy="18" r="16" fill="none" stroke="#22c55e" stroke-width="2"
                                stroke-dasharray="100.53" stroke-dashoffset="0" stroke-linecap="round"
                                style="transition: stroke-dashoffset 0.9s linear, stroke 0.3s ease"/>
                    </svg>
                    <span id="refresh-countdown" class="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold" style="color:var(--text-main)">--</span>
                </div>
                <span id="last-update" class="inline-flex items-center"></span>
                <button id="add-position-btn" class="bg-emerald-500 text-black px-4 py-1.5 rounded-xl text-sm font-bold border border-emerald-500 hover:bg-emerald-400 transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> <span id="add-position-label">新增持倉</span>
                </button>
                <button id="refresh-btn" class="bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white px-4 py-1.5 rounded-xl text-sm font-medium border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-all flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> <span id="refresh-label">更新</span>
                </button>
            </div>
        </header>

        <div class="p-8 space-y-6">

            <!-- V1.74 — Invest cmdbar (terminal-style quick-launch) -->
            <div>
                <div class="ea-cmdbar">
                    <span class="ea-cmdbar-prompt">›</span>
                    <input id="dc-ticker-input" type="text" maxlength="6"
                           placeholder="MSFT / NVDA / GOOGL"
                           class="ea-cmdbar-input"
                           autocomplete="off" spellcheck="false">
                    <span class="text-[10px] text-zinc-500 font-mono mr-3 hidden md:inline-flex items-center gap-1" id="dc-risk-hint">
                        <span data-i18n="decisions.cmdbar_risk_hint">RISK:</span>
                        <span id="dc-risk-value" class="font-bold text-emerald-500">MEDIUM</span>
                    </span>
                    <button id="dc-run-btn" class="ea-cmdbar-btn">
                        <i data-lucide="play" class="w-3 h-3"></i>
                        <span data-i18n="decisions.cmdbar_run">分析</span>
                    </button>
                </div>
                <div class="ea-cmdbar-recent" id="dc-recent-chips-wrap" hidden>
                    <span class="text-[10px] text-zinc-500 font-mono" data-i18n="decisions.cmdbar_recent_label">最近：</span>
                    <span id="dc-recent-chips" class="flex gap-1.5 flex-wrap"></span>
                </div>
            </div>

            <!-- Summary Row -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="summary-row">
                <div class="glass-card dc-summary-tile p-4 border-l-4 border-l-emerald-500">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-active">監控中</div>
                    <div class="dc-summary-num text-emerald-500" id="count-execute">–</div>
                </div>
                <div class="glass-card dc-summary-tile p-4 border-l-4 border-l-yellow-500">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-waiting">等待進場</div>
                    <div class="dc-summary-num text-yellow-500" id="count-waiting">–</div>
                </div>
                <div class="glass-card dc-summary-tile p-4 border-l-4 border-l-blue-500">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-conf">平均信心</div>
                    <div class="dc-summary-num" id="avg-conf" style="color:var(--text-card-title)">–</div>
                </div>
                <div class="glass-card dc-summary-tile p-4 border-l-4 border-l-violet-500">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-rr">平均風報比</div>
                    <div class="dc-summary-num" id="avg-rr" style="color:var(--text-card-title)">–</div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="flex items-center gap-2 flex-wrap" id="filter-tabs">
                <button data-filter="all"        class="filter-tab active px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-all">全部</button>
                <button data-filter="execute"    class="filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-execute">進行中</button>
                <button data-filter="waiting"    class="filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-waiting">等待中</button>
                <button data-filter="historical" class="filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-historical">歷史</button>
                <button data-filter="positions"  class="filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-positions">持倉</button>
                <input id="ticker-search" type="text" placeholder="搜尋 ticker…"
                       class="ml-auto px-3 py-1.5 rounded-lg text-xs font-mono border bg-transparent outline-none w-32 focus:w-44 transition-all"
                       style="border-color:var(--border-card);color:var(--text-main);background:var(--bg-card)" />
            </div>

            <!-- Cards Grid / Positions Table -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="watchlist-grid">
                <div class="col-span-full py-20 text-center animate-pulse text-zinc-600">Loading decisions...</div>
            </div>
            <div id="positions-table-container" class="hidden"></div>

        </div>
    </main>

    <!-- Rich hover tooltip — V2.17.9: unified to #signal-tip-tooltip (.stt-* visual)
         shared with sector + index pages. Populated by page-decisions.js handler. -->
    <div id="signal-tip-tooltip" aria-hidden="true"></div>

    <!-- Position Modal -->
    <div id="position-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[110] flex items-center justify-center p-8 hidden">
        <div class="border border-zinc-200 dark:border-zinc-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden" style="background-color: var(--bg-card)">
            <div class="h-14 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-6">
                <h3 class="font-bold flex items-center gap-2" style="color: var(--text-main)">
                    <i data-lucide="plus-circle" class="w-4 h-4 text-emerald-500"></i>
                    <span id="position-modal-title">新增持倉記錄</span>
                </h3>
                <button id="close-position-modal" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-200 dark:border-zinc-800">CLOSE [ESC]</button>
            </div>
            <form id="position-form" class="p-6 space-y-4" style="color: var(--text-main)">
                <div class="grid grid-cols-2 gap-3">
                    <label class="block">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="pf-ticker-lbl">Ticker</span>
                        <input name="ticker" required maxlength="6" class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono font-bold uppercase" placeholder="MU">
                    </label>
                    <label class="block">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="pf-date-lbl">Date</span>
                        <input name="entry_date" type="date" required class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono">
                    </label>
                    <label class="block">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="pf-price-lbl">Price</span>
                        <input name="entry_price" type="number" step="0.01" required class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono" placeholder="382.50">
                    </label>
                    <label class="block">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="pf-shares-lbl">Shares</span>
                        <input name="shares" type="number" step="0.01" required class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono" placeholder="50">
                    </label>
                    <label class="block col-span-2">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="pf-track-lbl">Track</span>
                        <select name="track" class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono">
                            <option value="aggressive" data-i18n-key="track_aggressive">Aggressive</option>
                            <option value="conservative" data-i18n-key="track_conservative">Conservative</option>
                            <option value="manual" selected data-i18n-key="track_manual">Manual</option>
                        </select>
                    </label>
                </div>
                <label class="block">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="pf-notes-lbl">Notes</span>
                    <textarea name="notes" rows="2" class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent text-xs" placeholder="V4.6 STAGED aggressive fill"></textarea>
                </label>
                <div id="position-form-error" class="text-xs text-red-400 hidden"></div>
                <div class="flex gap-3 justify-end pt-2">
                    <button type="button" id="pf-cancel" class="px-4 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 text-xs font-bold hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-all">Cancel</button>
                    <button type="submit" id="pf-submit" class="px-4 py-2 rounded-lg bg-emerald-500 text-black text-xs font-bold hover:bg-emerald-400 transition-all">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Close Position Modal -->
    <div id="exit-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[110] flex items-center justify-center p-8 hidden">
        <div class="border border-zinc-200 dark:border-zinc-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden" style="background-color: var(--bg-card)">
            <div class="h-14 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-6">
                <h3 class="font-bold flex items-center gap-2" style="color: var(--text-main)">
                    <i data-lucide="log-out" class="w-4 h-4 text-amber-500"></i>
                    <span id="exit-modal-title">平倉持倉</span>
                </h3>
                <button id="close-exit-modal" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-200 dark:border-zinc-800">CLOSE [ESC]</button>
            </div>
            <form id="close-form" class="p-6 space-y-4" style="color: var(--text-main)">
                <div class="text-[11px] text-zinc-500 font-mono" id="close-summary"></div>
                <div class="grid grid-cols-2 gap-3">
                    <label class="block">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="cf-date-lbl">Exit Date</span>
                        <input name="exit_date" type="date" required class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono">
                    </label>
                    <label class="block">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="cf-price-lbl">Exit Price</span>
                        <input name="exit_price" type="number" step="0.01" required class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono">
                    </label>
                    <label class="block col-span-2">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="cf-shares-lbl">Shares to Close</span>
                        <input name="closed_shares" type="number" step="0.01" required class="mt-1 w-full px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-transparent font-mono">
                        <span class="text-[10px] text-zinc-500" id="cf-hint">Less than total = partial exit</span>
                    </label>
                </div>
                <div id="close-form-preview" class="text-xs font-mono p-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/40 hidden"></div>
                <div id="close-form-error" class="text-xs text-red-400 hidden"></div>
                <div class="flex gap-3 justify-end pt-2">
                    <button type="button" id="cf-cancel" class="px-4 py-2 rounded-lg border border-zinc-200 dark:border-zinc-800 text-xs font-bold hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-all">Cancel</button>
                    <button type="submit" id="cf-submit" class="px-4 py-2 rounded-lg bg-amber-500 text-black text-xs font-bold hover:bg-amber-400 transition-all">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Report Modal (reused) -->
    <div id="report-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-8 hidden">
        <div class="border border-zinc-200 dark:border-zinc-800 w-full max-w-5xl h-full rounded-2xl flex flex-col shadow-2xl overflow-hidden" style="background-color: var(--bg-card)">
            <div class="h-14 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-6">
                <h3 class="font-bold flex items-center gap-2" style="color: var(--text-main)">
                    <i data-lucide="file-text" class="w-4 h-4 text-emerald-500"></i> Audit Report
                </h3>
                <button id="close-modal" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-200 dark:border-zinc-800">CLOSE [ESC]</button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto" style="background-color: var(--bg-card)"></div>
        </div>
    </div>

    <!-- History Drill Overlay (click backdrop or ESC to dismiss) -->
    <div id="history-drill-overlay" class="fixed inset-0 bg-white/70 dark:bg-white/30 backdrop-blur-xl z-[105] hidden flex flex-col p-8">
        <div class="flex items-center justify-between mb-4 shrink-0">
            <h3 id="history-drill-title" class="text-lg font-bold flex items-center gap-2" style="color:var(--text-main)">
                <i data-lucide="history" class="w-5 h-5 text-blue-400"></i>
                <span>Ticker — History</span>
            </h3>
            <button id="history-drill-close" class="text-zinc-400 hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-700">CLOSE [ESC]</button>
        </div>
        <div class="flex-1 overflow-x-auto overflow-y-hidden">
            <div id="history-drill-rail" class="flex gap-6 h-full items-start pb-4"></div>
            <div id="history-drill-empty" class="hidden text-center py-20 text-zinc-500"></div>
        </div>
    </div>

    <!-- Debug Console -->
    <div id="debug-console" class="fixed bottom-0 left-64 right-0 border-t border-zinc-200 dark:border-zinc-800 p-4 z-50 hidden font-mono text-[10px]" style="background-color: var(--bg-main); color: var(--text-main)">
        <div class="flex items-center justify-between mb-2 pb-1 border-b border-zinc-200 dark:border-zinc-900">
            <div class="flex items-center gap-2"><i data-lucide="terminal" class="w-3 h-3 text-green-500"></i><span class="font-bold uppercase tracking-widest text-[9px]">SYSTEM LOGS</span></div>
            <button onclick="document.getElementById('debug-console').classList.add('hidden')"><i data-lucide="x" class="w-3 h-3"></i></button>
        </div>
        <div id="log-output" class="space-y-1 max-h-80 overflow-y-auto custom-scrollbar"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="i18n.js"></script>
    <script src="utils.js"></script>
    <script src="data-store.js"></script>
    <script src="analyze-queue.js"></script>
    <script src="page-decisions.js"></script>
</body>
</html>
