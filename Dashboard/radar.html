<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('dash_theme')||'dark';document.documentElement.setAttribute('data-theme',t);'dark'===t?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | 短期雷達</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- V2.12.0 — sector heatmap (D3) + K-line drill (Chart.js) -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex min-h-screen transition-all" data-page="radar">

    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all"></aside>

    <main class="ml-64 flex-1 flex flex-col">

        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-20">
            <div class="flex items-center gap-3">
                <i data-lucide="radar" class="w-5 h-5 text-indigo-500"></i>
                <h2 id="radar-title" class="text-lg font-bold">短期雷達</h2>
                <span id="radar-subtitle" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden sm:block">Tactical Opportunity Radar v0.2</span>
                <span class="experimental-badge" id="radar-experimental-badge">
                    <i data-lucide="flask-conical" class="w-3 h-3"></i>
                    <span id="radar-experimental-text">EXPERIMENTAL</span>
                </span>
            </div>
            <div class="flex items-center gap-3">
                <span id="radar-as-of" class="text-[10px] font-mono text-zinc-500"></span>
                <span id="radar-log-days" class="text-[10px] font-mono text-zinc-500"></span>

                <div class="flex items-center gap-1 text-[10px]" id="radar-horizon-toggle-wrap">
                    <span class="text-zinc-500" id="radar-horizon-label">Horizon:</span>
                    <button id="horizon-1d"  class="sort-toggle px-2 py-0.5 rounded">1d</button>
                    <button id="horizon-5d"  class="sort-toggle active px-2 py-0.5 rounded">5d ★</button>
                    <button id="horizon-15d" class="sort-toggle px-2 py-0.5 rounded">15d</button>
                </div>
                <div class="flex items-center gap-1 text-[10px]">
                    <span class="text-zinc-500" id="radar-sort-label">Sort:</span>
                    <button id="sort-by-short" class="sort-toggle active px-2 py-0.5 rounded">Short</button>
                    <button id="sort-by-mid" class="sort-toggle px-2 py-0.5 rounded">Mid</button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 space-y-5">

            <div id="radar-no-data" class="hidden">
                <div class="glass-card p-10 text-center space-y-3">
                    <i data-lucide="radar" class="w-12 h-12 mx-auto text-zinc-500"></i>
                    <div class="text-sm text-zinc-500" id="radar-no-data-text">尚無 tactical 推薦。請先跑 daily_update.sh Step 6（thematic-screener）</div>
                    <code class="text-[10px] text-zinc-600 block">bash daily_update.sh</code>
                </div>
            </div>

            <!-- V2.12.0 — Intraday K-line panel (collapsed; opens on heatmap tile click) -->
            <section id="radar-kline-panel" class="hidden glass-card p-4">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500">即時 K 線</span>
                        <span id="radar-kline-ticker" class="text-base font-black tracking-tight" style="color: var(--text-card-title)">—</span>
                        <span id="radar-kline-name" class="text-[10px] text-zinc-500 truncate max-w-[200px]">—</span>
                        <span id="radar-kline-price" class="font-mono text-sm font-bold">—</span>
                        <span id="radar-kline-change" class="font-mono text-[11px] font-bold">—</span>
                    </div>
                    <div class="flex items-center gap-3 text-[10px] font-mono text-zinc-500">
                        <span id="radar-kline-status">—</span>
                        <span id="radar-kline-updated">—</span>
                        <button id="radar-kline-close" class="text-zinc-500 hover:text-red-400" title="關閉 K 線">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>
                <div id="radar-kline-charts-wrap" class="grid grid-cols-1 gap-2 relative">
                    <div style="height: 220px; position: relative;">
                        <canvas id="radar-kline-canvas"></canvas>
                    </div>
                    <div style="height: 80px; position: relative;">
                        <canvas id="radar-volume-canvas"></canvas>
                    </div>
                    <!-- V2.12.0 — modern loading: top progress bar + center accent pill (theme-agnostic, no heavy backdrop) -->
                    <div id="radar-kline-loading" class="hidden absolute inset-0 pointer-events-none" style="z-index: 5;">
                        <!-- top indeterminate progress bar -->
                        <div class="absolute top-0 left-0 right-0 h-[2px] overflow-hidden rounded-t" style="background: rgba(99,102,241,0.08);">
                            <div class="kline-progress-shuttle absolute inset-y-0" style="width: 35%; background: linear-gradient(90deg, transparent 0%, rgb(99,102,241) 50%, transparent 100%); border-radius: 2px;"></div>
                        </div>
                        <!-- center accent pill with ticker + bouncing dots -->
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="kline-loading-pill px-3 py-1 rounded-full text-[10px] font-mono font-semibold flex items-center gap-2"
                                 style="background: rgba(99,102,241,0.07); color: rgb(99,102,241); border: 1px solid rgba(99,102,241,0.25); backdrop-filter: blur(4px);">
                                <span id="radar-kline-loading-ticker" class="tracking-wider">—</span>
                                <span class="kline-loading-dots"><span>•</span><span>•</span><span>•</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Regime banner (FRED + market) -->
            <div id="radar-regime-banner" class="regime-banner hidden">
                <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500" id="radar-regime-label-text">市場環境</span>
                <span id="radar-regime-pill" class="regime-pill" data-radar-tip="fred_regime">—</span>
                <span class="regime-metric">SPY <strong id="radar-spy">—</strong></span>
                <span class="regime-metric" data-radar-tip="spy_rsi">RSI <strong id="radar-rsi">—</strong></span>
                <span class="regime-metric" data-radar-tip="vix">VIX <strong id="radar-vix">—</strong></span>
                <span class="regime-metric" data-radar-tip="yield_curve">YC <strong id="radar-yc">—</strong></span>
                <span class="regime-metric" data-radar-tip="credit_spread">Credit <strong id="radar-credit">—</strong></span>
                <span class="regime-metric ml-auto" data-radar-tip="factor">Factor <strong id="radar-factor">—</strong></span>
            </div>

            <!-- Regime badges (RSI + VIX independent) -->
            <div id="radar-regime-badges" class="space-y-2"></div>

            <!-- All themes grid -->
            <section>
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xs font-black uppercase tracking-widest text-zinc-500" id="radar-themes-section-title">全部主題</h3>
                    <span class="text-[10px] text-zinc-600" id="radar-theme-count"></span>
                </div>
                <div id="radar-theme-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
            </section>

            <!-- Expanded movers panel (populated on click) -->
            <section id="radar-expanded-section" class="hidden">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xs font-black uppercase tracking-widest text-zinc-500">
                        <span id="radar-expanded-theme-name">—</span> · <span id="radar-expanded-suffix">Top Movers</span>
                    </h3>
                    <button id="radar-expanded-close" class="text-[10px] text-zinc-500 hover:text-zinc-300 flex items-center gap-1">
                        <i data-lucide="x" class="w-3 h-3"></i>
                        <span>close</span>
                    </button>
                </div>
                <div id="radar-expanded-movers" class="grid grid-cols-1 lg:grid-cols-2 gap-3"></div>
            </section>

        </div>

    </main>

    <!-- Hover tooltip for radar terms (same pattern as momentum.html) -->
    <div id="radar-term-tooltip" aria-hidden="true"></div>

    <!-- V2.12.0 — heatmap hover tooltip -->
    <div id="radar-heatmap-tooltip" class="hidden fixed w-72 rounded-lg border p-3 pointer-events-none"
         style="background:rgba(24,24,27,0.96);border-color:rgba(82,82,91,0.5);z-index:60;backdrop-filter:blur(8px);"></div>

    <script src="i18n.js"></script>
    <script src="utils.js"></script>
    <script src="data-store.js"></script>
    <script src="analyze-queue.js"></script>
    <script src="page-radar.js"></script>
</body>
</html>
