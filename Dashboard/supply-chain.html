<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('dash_theme')||'dark';document.documentElement.setAttribute('data-theme',t);'dark'===t?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應鏈探索 | AI 投資委員會</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* ── Controls — command-bar style ─────────────────────────── */
      .sc-bar {
        display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        padding: 12px 16px; border-radius: 14px;
        background: var(--bg-card); border: 1px solid rgba(161,161,170,0.20);
        box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .sc-bar:focus-within {
        border-color: rgba(16,185,129,0.55);
        box-shadow: 0 0 0 3px rgba(16,185,129,0.13), 0 1px 0 rgba(255,255,255,0.04) inset;
      }
      .sc-prompt {
        font-family: 'JetBrains Mono', monospace; font-size: 16px;
        font-weight: 800; color: #10b981; line-height: 1; user-select: none;
      }
      .sc-select, .sc-input {
        font-size: 11px; font-weight: 600; padding: 6px 11px; border-radius: 8px;
        background: color-mix(in srgb, var(--text-main) 5%, transparent);
        border: 1px solid color-mix(in srgb, var(--text-main) 13%, transparent);
        color: var(--text-main); transition: border-color 0.12s;
      }
      .sc-select:hover, .sc-input:hover {
        border-color: color-mix(in srgb, var(--text-main) 26%, transparent);
      }
      .sc-input {
        width: 220px; font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.04em;
      }
      .sc-input::placeholder { color: var(--text-muted); }
      .sc-btn {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px; font-weight: 800; letter-spacing: 0.06em;
        padding: 6px 16px; border-radius: 8px; cursor: pointer;
        text-transform: uppercase;
        background: rgba(16,185,129,0.14); border: 1px solid rgba(16,185,129,0.42);
        color: #10b981; transition: all 0.15s;
      }
      .sc-btn:hover {
        background: rgba(16,185,129,0.24); border-color: rgba(16,185,129,0.66);
      }
      .sc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .sc-meta {
        margin-left: auto; font-size: 9.5px; color: var(--text-muted);
        font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      /* ── Diagram canvas ───────────────────────────────────────── */
      .sc-scroll {
        position: relative; overflow: auto; border-radius: 16px;
        background: var(--bg-card);
        border: 1px solid rgba(161,161,170,0.18);
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        min-height: 440px; max-height: calc(100vh - 248px);
      }
      .sc-canvas {
        position: relative;
        background-image: radial-gradient(circle at 1px 1px,
          color-mix(in srgb, var(--text-main) 9%, transparent) 1px, transparent 0);
        background-size: 24px 24px;
      }
      .sc-edges { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
      /* stage band — faint dashed column outline (modules are the blocks) */
      .sc-band {
        position: absolute; z-index: 0; border-radius: 16px;
        background: transparent;
        border: 1px dashed color-mix(in srgb, var(--text-main) 8%, transparent);
      }
      /* module sub-panel — the visible industry block */
      .sc-module {
        position: absolute; z-index: 0; border-radius: 11px;
        background: color-mix(in srgb, var(--text-main) 5%, transparent);
        border: 1px solid color-mix(in srgb, var(--text-main) 12%, transparent);
      }
      .sc-module-head {
        position: absolute; top: 7px; left: 11px; right: 11px;
        font-size: 8.5px; font-weight: 900; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--text-muted);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .sc-colhead {
        position: absolute; z-index: 3; display: flex; align-items: center;
        gap: 6px; font-size: 9px; font-weight: 900; letter-spacing: 0.13em;
        text-transform: uppercase; color: var(--text-muted);
      }
      .sc-colhead-idx {
        display: inline-flex; align-items: center; justify-content: center;
        width: 15px; height: 15px; border-radius: 5px;
        background: color-mix(in srgb, var(--text-main) 10%, transparent);
        color: var(--text-main); font-family: 'JetBrains Mono', monospace;
        font-size: 8.5px; font-weight: 800;
      }
      .sc-colhead-name {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }

      /* ── Node cards ───────────────────────────────────────────── */
      .sc-node {
        position: absolute; z-index: 2; box-sizing: border-box;
        background: var(--bg-card); backdrop-filter: blur(6px);
        border: 1px solid rgba(161,161,170,0.22);
        border-radius: 11px; padding: 8px 10px 8px 13px;
        cursor: pointer; overflow: hidden;
        display: flex; flex-direction: column; gap: 4px;
        box-shadow: var(--sc-glow, none);
        opacity: 0; transform: translateY(9px);
        animation: sc-reveal 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      }
      @keyframes sc-reveal { to { opacity: 1; transform: translateY(0); } }
      .sc-node:hover {
        transform: translateY(-3px);
        border-color: rgba(161,161,170,0.5);
        box-shadow: var(--sc-glow, 0 0 0 transparent),
                    0 12px 30px -14px rgba(0,0,0,0.55);
      }
      .sc-node-stripe {
        position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      }
      .sc-node.sc-spine {
        border-color: color-mix(in srgb, #22c55e 46%, rgba(161,161,170,0.22));
      }
      .sc-node.sc-sel {
        outline: 2px solid var(--secondary); outline-offset: 1px;
        border-color: transparent;
      }
      .sc-heat-hot  { --sc-glow: 0 0 20px -3px rgba(239,68,68,0.50); }
      .sc-heat-warm { --sc-glow: 0 0 17px -4px rgba(249,115,22,0.42); }
      .sc-heat-cold { --sc-glow: 0 0 14px -5px rgba(59,130,246,0.30); }
      .sc-node-top { display: flex; align-items: center; gap: 6px; }
      .sc-node-label {
        font-size: 12.5px; font-weight: 700; color: var(--text-card-title);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      }
      .sc-tkr {
        font-family: 'JetBrains Mono', monospace; font-size: 9px;
        font-weight: 800; padding: 1.5px 5px; border-radius: 5px;
        letter-spacing: 0.03em; flex-shrink: 0;
      }
      .sc-tkr-real {
        background: rgba(59,130,246,0.14); color: #60a5fa;
        border: 1px solid rgba(59,130,246,0.30);
      }
      .sc-tkr-none {
        background: color-mix(in srgb, var(--text-main) 7%, transparent);
        color: var(--text-muted);
        border: 1px solid color-mix(in srgb, var(--text-main) 12%, transparent);
      }
      .sc-role {
        font-size: 9.5px; color: var(--text-muted); line-height: 1.4;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        overflow: hidden; flex: 1 1 auto; min-height: 0;
      }
      .sc-badges {
        display: flex; gap: 5px 6px; align-items: center; flex-wrap: wrap;
        flex-shrink: 0;
      }
      .sc-badge {
        font-size: 9px; font-weight: 800; padding: 1.5px 6px;
        border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase;
        display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;
      }
      .sc-heat-tag {
        display: inline-flex; align-items: center; gap: 4px;
        font-size: 8.5px; font-weight: 800; letter-spacing: 0.06em;
        text-transform: uppercase; color: var(--text-muted); white-space: nowrap;
      }
      .sc-heat-dot { width: 7px; height: 7px; border-radius: 999px; }
      .sc-stage {
        font-size: 8.5px; font-weight: 800; padding: 1.5px 6px;
        border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase;
        border: 1px solid; white-space: nowrap;
      }

      /* ── Detail panel ─────────────────────────────────────────── */
      .sc-detail {
        position: fixed; top: 84px; right: 20px; width: 300px; z-index: 30;
        background: var(--bg-card); backdrop-filter: blur(14px);
        border: 1px solid rgba(161,161,170,0.30);
        border-radius: 14px; overflow: hidden; display: none;
        box-shadow: 0 20px 56px -14px rgba(0,0,0,0.66);
      }
      .sc-detail.show { display: block; animation: sc-reveal 0.22s ease forwards; }
      .sc-detail-head {
        padding: 12px 14px; display: flex; align-items: flex-start;
        justify-content: space-between; gap: 8px;
        border-bottom: 1px solid rgba(161,161,170,0.16);
        border-left: 3px solid var(--sc-detail-accent, #71717a);
      }
      .sc-detail-body { padding: 11px 14px 14px; }
      .sc-detail-x {
        cursor: pointer; color: var(--text-muted); font-size: 13px;
        line-height: 1; padding: 2px; transition: color 0.12s;
      }
      .sc-detail-x:hover { color: var(--text-main); }
      .sc-detail-row { font-size: 11px; margin: 6px 0; color: var(--text-muted); }
      .sc-detail-row strong { color: var(--text-main); }
      .sc-detail-sec {
        font-size: 8.5px; font-weight: 900; letter-spacing: 0.13em;
        text-transform: uppercase; color: var(--text-muted);
        margin: 12px 0 5px;
      }
      .sc-edge-row {
        font-size: 10.5px; color: var(--text-main); padding: 3px 0;
        display: flex; align-items: center; gap: 6px;
      }
      .sc-edge-rel {
        font-family: 'JetBrains Mono', monospace; font-size: 8px;
        color: var(--text-muted); letter-spacing: 0.02em;
      }
      .sc-edge-corr {
        font-family: 'JetBrains Mono', monospace; font-size: 8px;
        font-weight: 700; color: #4ade80; padding: 1px 4px; border-radius: 4px;
        background: rgba(34,197,94,0.14); cursor: help;
      }

      /* ── States + legend ──────────────────────────────────────── */
      .sc-status {
        text-align: center; padding: 80px 24px;
        color: var(--text-muted); font-size: 12px; line-height: 1.6;
      }
      .sc-legend {
        display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      }
      .sc-legend-item {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; color: var(--text-muted);
        padding: 4px 9px; border-radius: 999px; cursor: help;
        background: color-mix(in srgb, var(--text-main) 4%, transparent);
        border: 1px solid color-mix(in srgb, var(--text-main) 8%, transparent);
        transition: border-color 0.12s;
      }
      .sc-legend-item:hover {
        border-color: color-mix(in srgb, var(--text-main) 22%, transparent);
      }
      .sc-lg-stripe { width: 3px; height: 11px; border-radius: 2px; }
      /* shared pill tooltip (same pattern as sector.html) */
      #pill-tooltip {
        position: fixed; z-index: 9999; width: 270px;
        background: var(--bg-card); backdrop-filter: blur(14px);
        border: 1px solid rgba(161,161,170,0.30);
        border-radius: 10px; padding: 12px 14px;
        box-shadow: 0 12px 38px -10px rgba(0,0,0,0.6);
        pointer-events: none; opacity: 0; transition: opacity 0.12s;
      }
      #pill-tooltip.tip-visible { opacity: 1; }
      .tip-title {
        font-size: 11px; font-weight: 800; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--text-card-title); margin-bottom: 5px;
      }
      .tip-desc {
        font-size: 11px; line-height: 1.55; color: var(--text-main);
        margin-bottom: 8px;
      }
      .tip-scale {
        font-size: 10px; line-height: 1.7; color: var(--text-muted);
        border-top: 1px solid rgba(161,161,170,0.16); padding-top: 7px;
      }
      .sc-spinner {
        display: inline-block; width: 13px; height: 13px;
        border: 2px solid rgba(255,255,255,0.18); border-top-color: #10b981;
        border-radius: 999px; animation: sc-spin 0.7s linear infinite;
        vertical-align: -2px; margin-right: 6px;
      }
      @keyframes sc-spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex min-h-screen transition-all" data-page="supply-chain">

    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all"></aside>

    <main class="ml-64 flex-1 flex flex-col">
        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <i data-lucide="git-fork" class="w-5 h-5 text-emerald-400"></i>
                <h2 id="sc-title" class="text-lg font-bold">供應鏈探索</h2>
                <span id="sc-subtitle" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden sm:block">Supply Chain Explorer</span>
            </div>
        </header>

        <div class="p-7 space-y-4 max-w-[1400px] mx-auto w-full">
            <!-- Controls -->
            <div class="sc-bar">
                <span class="sc-prompt">&gt;</span>
                <select class="sc-select" id="sc-chain-select"></select>
                <input class="sc-input" id="sc-theme-input" list="sc-theme-list"
                       placeholder="輸入主題 (CPO / HBM…)">
                <datalist id="sc-theme-list"></datalist>
                <button class="sc-btn" id="sc-gen-btn">生成</button>
                <span class="sc-meta" id="sc-meta"></span>
            </div>

            <!-- Diagram -->
            <div class="sc-scroll" id="sc-scroll">
                <div class="sc-status" id="sc-status">載入中…</div>
                <div class="sc-canvas" id="sc-canvas" style="display:none;">
                    <svg class="sc-edges" id="sc-edges"></svg>
                </div>
            </div>

            <!-- Legend -->
            <div class="sc-legend" id="sc-legend">
                <span class="sc-legend-item" data-tip-key="us"><i class="sc-lg-stripe" style="background:#22c55e;"></i><span id="sc-lg-us">US 上市</span></span>
                <span class="sc-legend-item" data-tip-key="fl"><i class="sc-lg-stripe" style="background:#3b82f6;"></i><span id="sc-lg-fl">外股</span></span>
                <span class="sc-legend-item" data-tip-key="pi"><i class="sc-lg-stripe" style="background:#a855f7;"></i><span id="sc-lg-pi">擬上市</span></span>
                <span class="sc-legend-item" data-tip-key="pv"><i class="sc-lg-stripe" style="background:#71717a;"></i><span id="sc-lg-pv">私有</span></span>
                <span class="sc-legend-item" data-tip-key="verified" style="color:#22c55e;">✓ <span id="sc-lg-verified">追蹤中</span></span>
                <span class="sc-legend-item" data-tip-key="seen" style="color:#60a5fa;">◦ <span id="sc-lg-seen">有資料</span></span>
                <span class="sc-legend-item" data-tip-key="llm" style="color:#f59e0b;">⚠ <span id="sc-lg-llm">僅 LLM</span></span>
                <span class="sc-legend-item" data-tip-key="heat"><i class="sc-heat-dot" style="background:#ef4444;"></i><span id="sc-lg-heat">熱度</span></span>
                <span class="sc-legend-item" data-tip-key="stage"><i class="sc-heat-dot" style="background:#94a3b8;"></i><i class="sc-heat-dot" style="background:#3b82f6;"></i><i class="sc-heat-dot" style="background:#eab308;"></i><i class="sc-heat-dot" style="background:#f97316;"></i><i class="sc-heat-dot" style="background:#22c55e;"></i><span id="sc-lg-stage">商用階段</span></span>
            </div>
        </div>

        <!-- Node detail panel -->
        <div class="sc-detail" id="sc-detail"></div>
    </main>

    <!-- shared legend pill tooltip -->
    <div id="pill-tooltip"></div>

    <script src="i18n.js"></script>
    <script src="utils.js"></script>
    <script src="page-supply-chain.js"></script>
</body>
</html>
