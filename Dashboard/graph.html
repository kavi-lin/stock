<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('dash_theme')||'dark';document.documentElement.setAttribute('data-theme',t);'dark'===t?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | 知識圖譜</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/force-graph@1.43"></script>

    <style>
        /* Canvas is ALWAYS the deep-space dark — independent of dashboard theme */
        .ng-canvas {
            background-color: #050609;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(161,161,170,0.07) 1px, transparent 0);
            background-size: 36px 36px;
            position: relative;
            overflow: hidden;
            min-height: 0;       /* allow flex child to shrink properly */
        }
        .ng-canvas::after {
            content: '';
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 35%, #050609 92%);
            transition: opacity 480ms ease, background 480ms ease;
            opacity: 0.85;
        }

        /* ── Thermographic mode: only intensifies vignette + adds aurora ── */
        body.ng-thermal .ng-canvas::after {
            background:
                radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, #050609 95%),
                radial-gradient(ellipse 1200px 800px at 30% 50%, rgba(120,30,20,0.10), transparent 75%);
            opacity: 1;
        }
        body.ng-thermal .ng-side {
            border-color: rgba(251,191,36,0.22);
            box-shadow: 0 0 0 1px rgba(251,191,36,0.05), 0 18px 60px -20px rgba(0,0,0,0.55);
        }

        /* Side panels stay readable on dark canvas */
        .ng-side {
            background: rgba(16, 17, 21, 0.86) !important;
            color: #e4e4e7;
        }
        .ng-side label, .ng-side h3, .ng-side h4 { color: #d4d4d8; }
        .ng-side .text-zinc-500 { color: #a1a1aa !important; }

        #graph-host {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        #graph-host canvas { display: block; }

        /* Subtle pulsing aurora drawn behind canvas only during thermal mode.
           Pure CSS — separate stacking element so canvas pointer events untouched. */
        .ng-canvas::before {
            content: '';
            position: absolute; inset: 0; pointer-events: none;
            opacity: 0;
            background: radial-gradient(60% 50% at 50% 50%,
                rgba(255,210,140,0.12) 0%,
                rgba(220,90,40,0.06) 35%,
                transparent 70%);
            transition: opacity 700ms ease;
            z-index: 0;
            mix-blend-mode: screen;
        }
        body.ng-thermal .ng-canvas::before {
            opacity: 1;
            animation: ngAurora 4.2s ease-in-out infinite alternate;
        }
        @keyframes ngAurora {
            0%   { transform: scale(1.0)   translate(0, 0);    opacity: 0.85; }
            50%  { transform: scale(1.06)  translate(2%, -1%); opacity: 1.0;  }
            100% { transform: scale(0.97)  translate(-1%, 1%); opacity: 0.78; }
        }

        .ng-side {
            backdrop-filter: blur(10px);
            background: color-mix(in srgb, var(--bg-card) 92%, transparent);
            border: 1px solid rgba(161,161,170,0.18);
        }

        .ng-stat-num {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
            font-weight: 800;
        }

        .ng-chip {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid rgba(161,161,170,0.30);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }
        .ng-chip[data-type='ticker']     { color: #93c5fd; border-color: rgba(147,197,253,0.30); }
        .ng-chip[data-type='theme']      { color: #fbbf24; border-color: rgba(251,191,36,0.30); }
        .ng-chip[data-type='catalyst']   { color: #f87171; border-color: rgba(248,113,113,0.30); }
        .ng-chip[data-type='sector']     { color: #a78bfa; border-color: rgba(167,139,250,0.30); }
        .ng-chip[data-type='narrative']  { color: #34d399; border-color: rgba(52,211,153,0.30); }
        .ng-chip[data-type='thesis']     { color: #f472b6; border-color: rgba(244,114,182,0.30); }

        .ng-filter-row label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 11px; padding: 4px 0;
            color: var(--text-card-title);
        }
        .ng-filter-row input[type='checkbox'] { accent-color: #3b82f6; }

        .ng-neighbor-row {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .ng-neighbor-row:hover { background: rgba(59,130,246,0.10); }
        .ng-neighbor-row .label { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .ng-neighbor-row .weight { font-family: 'JetBrains Mono', monospace; color: #71717a; }

        .ng-search-input {
            background: var(--bg-card);
            border: 1px solid rgba(161,161,170,0.25);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-main);
            width: 100%;
        }
        .ng-search-input:focus { outline: 2px solid rgba(59,130,246,0.4); }
    </style>
</head>
<body class="flex transition-all" data-page="graph" style="height:100vh;overflow:hidden">

    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all" style="z-index:30"></aside>

    <main class="ml-64 flex-1 flex flex-col" style="height:100vh">

        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-20" style="background-color:var(--bg-main)">
            <div class="flex items-center gap-3">
                <i data-lucide="network" class="w-5 h-5 text-blue-500"></i>
                <h2 id="ng-title" class="text-lg font-bold">知識圖譜</h2>
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden sm:block">Project Nexus</span>
                <span id="ng-version-chip" class="text-[9px] font-mono text-zinc-500 hidden md:inline">v3.0.0</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="ng-meta-line" class="text-[10px] font-mono text-zinc-500"></span>
            </div>
        </header>

        <div class="flex-1 ng-canvas relative">
            <!-- collapsible left side panel -->
            <button id="ng-side-toggle" class="absolute top-4 left-4 z-20 rounded-md px-2 py-1 text-[10px] font-black uppercase tracking-widest ng-side hover:border-blue-400" title="收合 / 展開 控制台">
                <i data-lucide="panel-left" class="w-3.5 h-3.5 inline-block align-middle"></i>
            </button>

            <div id="ng-side-panel" class="absolute top-14 left-4 w-64 max-h-[calc(100vh-8rem)] overflow-y-auto p-3 rounded-xl ng-side z-10 space-y-3 transition-transform">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">搜尋節點</label>
                    <input id="ng-search" class="ng-search-input mt-1" placeholder="ticker / theme / catalyst …" autocomplete="off" />
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-1">節點類型</label>
                    <div id="ng-filter-types" class="ng-filter-row"></div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-1">時間衰減倍率</label>
                    <input id="ng-decay" type="range" min="0.5" max="3" step="0.1" value="1" class="w-full" />
                    <div class="text-[10px] font-mono text-zinc-500 flex justify-between">
                        <span>×0.5</span><span id="ng-decay-readout">×1.0</span><span>×3.0</span>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-1 flex items-center justify-between">
                        <span>顯示 provisional</span>
                        <input id="ng-show-provisional" type="checkbox" />
                    </label>
                </div>

                <div class="flex gap-2">
                    <button id="ng-zoom-fit" class="flex-1 text-[10px] font-black uppercase tracking-widest px-2 py-1.5 rounded border border-zinc-600/40 hover:border-blue-400 hover:text-blue-400">置中</button>
                    <button id="ng-reset" class="flex-1 text-[10px] font-black uppercase tracking-widest px-2 py-1.5 rounded border border-zinc-600/40 hover:border-rose-400 hover:text-rose-400">重設</button>
                </div>

                <div class="text-[10px] text-zinc-500 leading-relaxed">
                    點擊 ticker → BFS 3 跳路徑追蹤<br/>
                    背景拖曳 = 平移 / 滾輪 = 縮放
                </div>
            </div>

            <!-- right detail panel (populated on click) -->
            <div id="ng-detail" class="hidden absolute top-14 right-4 w-80 max-h-[calc(100vh-8rem)] overflow-y-auto p-3 rounded-xl ng-side z-10 space-y-3"></div>

            <!-- graph host -->
            <div id="graph-host"></div>

            <!-- loading / error states -->
            <div id="ng-status" class="absolute inset-0 flex items-center justify-center text-zinc-500 text-sm pointer-events-none">
                <div class="text-center">
                    <i data-lucide="loader-circle" class="w-8 h-8 mx-auto animate-spin opacity-60"></i>
                    <div class="mt-2">載入 Nexus 圖譜中…</div>
                </div>
            </div>
        </div>
    </main>

    <script src="i18n.js"></script>
    <script src="utils.js"></script>
    <script src="components.js"></script>
    <script src="page-graph.js"></script>
</body>
</html>
