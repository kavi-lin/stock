<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('dash_theme')||'dark';document.documentElement.setAttribute('data-theme',t);'dark'===t?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex min-h-screen transition-all" data-page="index">

    <!-- Sidebar (populated by UI.renderSidebar) -->
    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all"></aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 flex flex-col">
        
        <!-- Header -->
        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-10">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest" data-i18n="market_status">市場狀態</span>
                    <span class="text-xs font-bold text-zinc-300" id="market-status-text">計算中...</span>
                </div>
                <div class="h-8 w-px bg-zinc-200 dark:bg-zinc-900"></div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest" data-i18n="operator">操作員</span>
                    <span class="text-sm font-semibold">KAVI_LIN</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <span id="last-update" class="text-[10px] text-zinc-500 font-mono tracking-tighter hidden sm:block">SYNCING...</span>
                <button id="refresh-btn" onclick="updateDashboard()" class="bg-white dark:bg-zinc-900/80 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-700 dark:text-white border border-zinc-200 dark:border-zinc-800 shadow-sm px-4 py-1.5 rounded-xl text-sm font-medium transition-all flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                    更新
                </button>
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-green-500 to-emerald-700 p-px">
                  <div class="w-full h-full rounded-xl bg-white dark:bg-black flex items-center justify-center">
                    <span class="text-xs font-bold">KV</span>
                  </div>
                </div>
            </div>
        </header>

        <!-- Dashboard Grid -->
        <div class="p-6 space-y-5">

            <!-- Row 1: Market Conviction Hero + Verdict -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

                <!-- Composite Signal Hero (2/3) -->
                <div class="lg:col-span-2 glass-card p-6" id="signal-hero">
                    <div class="flex items-center gap-2 mb-5">
                        <i data-lucide="crosshair" class="w-4 h-4 text-zinc-400"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500" data-i18n="conviction_title">市場信心指標</span>
                    </div>
                    <div class="flex items-center gap-6">
                        <!-- Score Dial -->
                        <div class="shrink-0 w-28 flex flex-col items-center">
                            <div id="composite-score" class="text-6xl font-black tracking-tighter leading-none">–</div>
                            <div class="w-full h-2 rounded-full bg-zinc-200 dark:bg-zinc-800 mt-3 mb-2">
                                <div id="composite-bar" class="h-2 rounded-full transition-all duration-700" style="width:0%"></div>
                            </div>
                            <div id="composite-label" class="text-[10px] font-black uppercase tracking-widest">LOADING</div>
                        </div>
                        <!-- Divider -->
                        <div class="w-px self-stretch bg-zinc-200 dark:bg-zinc-800 shrink-0"></div>
                        <!-- Component Breakdown -->
                        <div class="flex-1 space-y-2.5" id="component-bars">
                            <!-- JS rendered -->
                        </div>
                    </div>
                    <p id="conviction-summary" class="text-[10px] text-zinc-500 mt-5 border-t border-zinc-800 pt-3 leading-relaxed"></p>
                </div>

                <!-- Verdict Card (1/3) -->
                <div class="glass-card p-6 flex flex-col gap-4" id="verdict-card">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <i data-lucide="shield" class="w-4 h-4 text-zinc-400"></i>
                            <div>
                                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500" data-i18n="action_posture">操作方向儀</span>
                                <p class="text-[8px] text-zinc-700 leading-tight" data-i18n="action_posture_desc">根據體制 + 廣度 + 旗幟，決定倉位與激進程度</p>
                            </div>
                        </div>
                    </div>
                    <!-- Regime -->
                    <div>
                        <p class="text-[9px] text-zinc-600 uppercase tracking-widest mb-1" data-i18n="regime_label">市場體制</p>
                        <p class="text-lg font-black" id="regime-text" style="color:var(--primary)">–</p>
                        <p class="text-[9px] text-zinc-700 mt-0.5 font-mono" id="regime-sub"></p>
                    </div>
                    <!-- Exposure Ceiling -->
                    <div>
                        <p class="text-[9px] text-zinc-600 uppercase tracking-widest mb-1" data-i18n="exposure_label">最高倉位上限</p>
                        <p class="text-2xl font-black text-orange-400" id="exposure-ceiling-val">–</p>
                        <p class="text-[8px] text-zinc-700 mt-0.5" data-i18n="exposure_hint">各訊號建議最保守值</p>
                    </div>
                    <!-- Flags -->
                    <div id="flags-compact" class="space-y-1.5 mt-auto"></div>
                </div>
            </div>

            <!-- Row 2: 5 Signal Angle Cards -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3" id="signal-angle-grid">
                <!-- JS rendered -->
            </div>

            <!-- Row 3: Recent Analysis + Quick Launch -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

                <!-- Recent Analysis -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xs font-bold flex items-center gap-2">
                            <i data-lucide="history" class="w-4 h-4 text-emerald-500"></i>
                            <span data-i18n="recent_audit">最近審查個股</span>
                        </h3>
                        <a href="decisions.html?view=historical" class="text-[10px] font-bold text-zinc-500 hover:text-emerald-500 transition-all uppercase tracking-widest flex items-center gap-1">
                            <span data-i18n="view_all">查看全部</span><i data-lucide="chevron-right" class="w-3 h-3"></i>
                        </a>
                    </div>
                    <div class="space-y-3" id="audit-grid-condensed"></div>
                </div>

                <!-- Quick Launch -->
                <div class="glass-card p-6 border-dashed border-zinc-700 bg-emerald-500/5 flex flex-col items-center justify-center gap-4">
                    <i data-lucide="cpu" class="w-10 h-10 text-emerald-500/20"></i>
                    <div class="text-center">
                        <h4 class="font-bold" data-i18n="quick_launch">快速啟動引擎</h4>
                        <p class="text-xs text-zinc-500 mt-1" data-i18n="launch_desc">輸入 Ticker 或選擇指令進行自動化分析</p>
                    </div>
                    <div class="flex w-full max-w-xs gap-2">
                        <input type="text" id="ticker-input" placeholder="e.g. MSFT" class="flex-1 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-900 dark:text-white placeholder-zinc-400 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 transition-all uppercase" maxlength="6">
                        <button id="launch-btn" class="bg-green-600 hover:bg-green-500 text-black font-bold px-4 py-2 rounded-lg text-sm transition-all flex items-center gap-1.5">
                            <i data-lucide="play" class="w-3.5 h-3.5"></i>
                            <span data-i18n="start_btn">分析</span>
                        </button>
                    </div>
                    <!-- Launch status banner -->
                    <div id="launch-status" class="hidden w-full max-w-xs">
                        <div class="rounded-lg px-3 py-2.5 flex items-center justify-between gap-2 border" id="launch-status-box">
                            <div class="flex items-center gap-2 min-w-0">
                                <span id="launch-status-icon" class="shrink-0"></span>
                                <span class="text-xs font-mono truncate" id="launch-status-text">Starting...</span>
                            </div>
                            <span class="text-[10px] font-mono text-zinc-500 shrink-0" id="launch-elapsed">00:00</span>
                        </div>
                        <p id="launch-status-hint" class="text-[9px] text-zinc-500 mt-1 text-center"></p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- hidden elements kept for script.js compat -->
    <span id="regime-desc" class="hidden"></span>
    <span id="uptrend-gauge-wrap" class="hidden"></span>
    <span id="uptrend-gauge-label" class="hidden"></span>
    <span id="uptrend-gauge-val" class="hidden"></span>
    <span id="uptrend-gauge-bar" class="hidden"></span>
    <span id="fear-greed-val" class="hidden"></span>
    <span id="sentiment-desc" class="hidden"></span>
    <span id="themes-container" class="hidden"></span>
    <span id="warning-banner" class="hidden"></span>
    <span id="warning-flags-list" class="hidden"></span>
    <span id="warning-banner-title" class="hidden"></span>
    <span id="uptrend-label" class="hidden"></span>
    <span id="uptrend-ratio-val" class="hidden"></span>
    <span id="news-list" class="hidden"></span>

    <!-- Report Modal -->
    <div id="report-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-8 hidden">
        <div class="border border-zinc-200 dark:border-zinc-800 w-full max-w-5xl h-full rounded-2xl flex flex-col shadow-2xl overflow-hidden" style="background-color: var(--bg-card)">
            <div class="h-14 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-6" style="background-color: var(--bg-card)">
                <h3 class="font-bold flex items-center gap-2" style="color: var(--text-main)">
                    <i data-lucide="file-text" class="w-4 h-4 text-emerald-500"></i>
                    Audit Report
                </h3>
                <button id="close-modal" class="transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-200 dark:border-zinc-800" style="color: var(--text-muted)">CLOSE [ESC]</button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto" style="background-color: var(--bg-card)">
                <!-- MD Content or iFrame here -->
            </div>
        </div>
    </div>

    <!-- Debug Console -->
    <div id="debug-console" class="fixed bottom-0 left-64 right-0 border-t border-zinc-200 dark:border-zinc-800 p-4 transition-all z-50 hidden font-mono text-[10px]" style="background-color: var(--bg-main); color: var(--text-main)">
        <div class="flex items-center justify-between mb-2 pb-1 border-b border-zinc-200 dark:border-zinc-900">
            <div class="flex items-center gap-2">
                <i data-lucide="terminal" class="w-3 h-3 text-green-500"></i>
                <span class="font-bold uppercase tracking-widest text-[9px]" data-i18n="nav_logs">SYSTEM LOGS</span>
            </div>
            <button onclick="document.getElementById('debug-console').classList.add('hidden')" class="hover:text-white transition-colors">
                <i data-lucide="x" class="w-3 h-3"></i>
            </button>
        </div>
        <div id="log-output" class="space-y-1 max-h-80 overflow-y-auto custom-scrollbar"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="i18n.js"></script>
    <script src="utils.js"></script>
    <script src="components.js"></script>
    <script src="data-store.js"></script>
    <script src="script.js"></script>
</body>
</html>
