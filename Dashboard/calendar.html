<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script>!function(){var t=localStorage.getItem('dash_theme')||'dark';document.documentElement.setAttribute('data-theme',t);'dark'===t?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark')}();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | 決策日曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex min-h-screen transition-all" data-page="calendar">

    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all"></aside>

    <main class="ml-64 flex-1 flex flex-col">

        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-20">
            <div class="flex items-center gap-3">
                <i data-lucide="calendar-days" class="w-5 h-5 text-emerald-500"></i>
                <h2 id="cal-title" class="text-lg font-bold">決策日曆</h2>
                <span id="cal-subtitle" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden sm:block">Decision Review Hub</span>
                <span id="cal-stats" class="text-[10px] font-mono text-zinc-500"></span>
            </div>
            <div class="flex items-center gap-2">
                <button id="cal-prev" class="px-2 py-1 rounded hover:bg-zinc-200 dark:hover:bg-zinc-800 text-xs">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                </button>
                <span id="cal-month-label" class="text-sm font-bold w-32 text-center">—</span>
                <button id="cal-next" class="px-2 py-1 rounded hover:bg-zinc-200 dark:hover:bg-zinc-800 text-xs">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
                <span class="mx-2 text-zinc-700">|</span>
                <button id="cal-llm-review"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/20 text-xs font-bold transition-all"
                        title="複製 prompt + 最新 event_index 到 clipboard, 貼到新 Claude 對話即可">
                    <i data-lucide="bot" class="w-3.5 h-3.5"></i>
                    <span id="cal-llm-btn-text">Ask LLM Review</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 space-y-5">

            <!-- No-data state -->
            <div id="cal-no-data" class="hidden">
                <div class="glass-card p-10 text-center space-y-3">
                    <i data-lucide="calendar-x" class="w-12 h-12 mx-auto text-zinc-500"></i>
                    <div class="text-sm text-zinc-500" id="cal-no-data-text">尚無決策資料。請先跑 indexer：</div>
                    <code class="text-[10px] text-zinc-600 block">python3 scripts/build_event_index.py</code>
                </div>
            </div>

            <!-- Top: Calendar grid (right rail removed — events now render inline in cells) -->
            <div id="cal-main" class="hidden grid grid-cols-1 gap-4">

                <!-- Calendar grid -->
                <section>
                    <div id="cal-grid" class="grid grid-cols-7 gap-1"></div>

                    <!-- Inline detail panel (replaces drawer; lives between grid and filter bar) -->
                    <div id="cal-detail" class="cal-detail-panel hidden" aria-hidden="true">
                        <div class="cal-detail-header">
                            <div class="flex items-center gap-3">
                                <span id="cal-detail-date" class="text-sm font-bold">—</span>
                                <span id="cal-detail-count" class="text-xs text-zinc-500">—</span>
                            </div>
                            <button id="cal-detail-close" class="p-1 rounded hover:bg-zinc-200 dark:hover:bg-zinc-800" title="Close">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div id="cal-detail-content" class="cal-detail-content"></div>
                    </div>

                    <!-- Filter bar — built by applyTranslations() / wireFilterBar() -->
                    <div id="cal-filterbar" class="cal-filterbar">
                        <div class="cal-filterbar-row">
                            <span id="cal-filter-mode-label" class="cal-filterbar-label">Mode</span>
                            <span id="cal-filter-presets" class="cal-filter-pills"></span>
                        </div>
                        <div class="cal-filterbar-row cal-filterbar-row-divider">
                            <span id="cal-filter-sources-label" class="cal-filterbar-label">Sources</span>
                            <span id="cal-filter-sources" class="cal-filter-pills"></span>
                        </div>
                        <div class="cal-filterbar-row cal-filterbar-row-divider">
                            <span id="cal-filter-verdicts-label" class="cal-filterbar-label">Verdicts</span>
                            <span id="cal-filter-verdicts" class="cal-filter-pills"></span>
                        </div>
                        <div class="cal-filterbar-row cal-filterbar-row-divider">
                            <span id="cal-filter-events-label" class="cal-filterbar-label">Events</span>
                            <span id="cal-filter-events" class="cal-filter-pills"></span>
                        </div>
                    </div>

                    <!-- Aggregate panel (constrained to calendar column width) -->
                    <section id="cal-aggregate" class="hidden mt-10">
                        <div class="cal-aggregate-titlebar">
                            <span class="cal-aggregate-titlebar-stripe"></span>
                            <span class="cal-aggregate-titlebar-icon">
                                <i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i>
                            </span>
                            <h3 class="cal-aggregate-titlebar-title" id="cal-aggregate-title">Aggregate by Source</h3>
                            <span class="cal-aggregate-titlebar-hint" id="cal-aggregate-hint">verdict 分布 + 命中率</span>
                        </div>
                        <div id="cal-aggregate-table" class="mt-3"></div>
                    </section>
                </section>

                <!-- Right rail: Coming Up — HIDDEN (events moved to in-cell chips per user request) -->
                <div class="hidden" id="cal-upcoming-rail">
                    <div class="cal-upcoming-panel">
                        <div class="cal-upcoming-header">
                            <div class="cal-upcoming-header-icon">
                                <i data-lucide="alarm-clock" class="w-3.5 h-3.5"></i>
                            </div>
                            <div>
                                <div class="cal-upcoming-title" id="cal-upcoming-title">Coming Up</div>
                                <div class="cal-upcoming-subtitle" id="cal-upcoming-subtitle">Next 7 days</div>
                            </div>
                        </div>
                        <div id="cal-upcoming-list"></div>
                        <div id="cal-upcoming-empty" class="cal-upcoming-empty hidden">
                            <div class="cal-upcoming-empty-icon">
                                <i data-lucide="calendar-clock" class="w-4 h-4"></i>
                            </div>
                            <div class="cal-upcoming-empty-title" id="cal-upcoming-empty-title">未來 7 天無事件</div>
                            <div class="cal-upcoming-empty-text" id="cal-upcoming-empty-text">尚未接入 earnings-calendar / FOMC 事件源。當前僅顯示 event_index 內的未來日期決策。</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script src="i18n.js"></script>
    <script src="utils.js"></script>
    <script src="page-calendar.js"></script>
</body>
</html>
