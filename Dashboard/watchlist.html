<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEL COMMAND | Watch Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=1.1.9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex min-h-screen transition-all">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all">
        <div class="p-4 flex items-center justify-between gap-1">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="activity" class="text-black w-5 h-5"></i>
                </div>
                <h1 class="text-base font-black tracking-tighter uppercase italic line-clamp-1 pr-2">INTEL<span class="text-green-500">COMMAND</span></h1>
            </div>
            <button id="theme-toggle" class="p-1.5 rounded-lg border border-transparent hover:border-zinc-200 dark:hover:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-900/50 transition-all group/theme">
                <i data-lucide="moon" class="w-3.5 h-3.5 text-zinc-500 group-hover/theme:text-yellow-500 transition-colors" id="theme-icon"></i>
            </button>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="index.html"     class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all"><i data-lucide="layout-dashboard" class="w-4 h-4"></i><span data-i18n="nav_dash">總體儀表板</span></a>
            <a href="watchlist.html" class="sidebar-item active flex items-center gap-3 px-3 py-2 rounded-md transition-all"><i data-lucide="radar" class="w-4 h-4"></i><span data-i18n="nav_watchlist">進場雷達</span></a>
            <a href="breadth.html"   class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all"><i data-lucide="bar-chart-2" class="w-4 h-4"></i><span data-i18n="nav_breadth">市場廣度</span></a>
            <a href="sector.html"    class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all"><i data-lucide="pie-chart" class="w-4 h-4"></i><span data-i18n="nav_sector">產業掃描</span></a>
            <a href="news.html"      class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all"><i data-lucide="newspaper" class="w-4 h-4"></i><span data-i18n="nav_news">即時新聞</span></a>
            <a href="history.html"   class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all"><i data-lucide="shield-check" class="w-4 h-4"></i><span data-i18n="nav_history">決策歷史</span></a>
        </nav>
        <div class="p-4 border-t border-zinc-200 dark:border-zinc-800 space-y-2">
            <button id="lang-toggle" class="w-full flex items-center justify-between px-3 py-2 rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-all text-xs font-bold text-zinc-400">
                <span id="lang-text">English</span>
                <i data-lucide="languages" class="w-3 h-3"></i>
            </button>
            <button id="show-logs" class="w-full flex items-center justify-between px-3 py-2 rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-all text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">
                <span>System Logs</span><i data-lucide="terminal" class="w-3 h-3"></i>
            </button>
            <div class="pt-2 px-3 text-[8px] text-zinc-400 dark:text-zinc-700 font-mono tracking-widest border-t border-zinc-200 dark:border-zinc-900/50 mt-2">V1.1.9.260414</div>
        </div>
    </aside>

    <!-- Main -->
    <main class="ml-64 flex-1 flex flex-col">
        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <i data-lucide="radar" class="w-5 h-5 text-emerald-500"></i>
                <h2 class="text-lg font-bold" id="page-title">進場雷達</h2>
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden sm:block" id="page-subtitle">Watch Radar</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="last-update" class="text-[10px] text-zinc-500 font-mono tracking-tighter">SYNCING...</span>
                <button id="refresh-btn" class="bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-white px-4 py-1.5 rounded-xl text-sm font-medium border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-all flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> <span id="refresh-label">更新</span>
                </button>
            </div>
        </header>

        <div class="p-8 space-y-8">

            <!-- Summary Row -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="summary-row">
                <div class="glass-card p-4 border-l-4 border-l-emerald-500">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-active">監控中</div>
                    <div class="text-3xl font-black text-emerald-500" id="count-execute">–</div>
                </div>
                <div class="glass-card p-4 border-l-4 border-l-yellow-500">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-waiting">等待進場</div>
                    <div class="text-3xl font-black text-yellow-500" id="count-waiting">–</div>
                </div>
                <div class="glass-card p-4">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-conf">平均信心</div>
                    <div class="text-3xl font-black" id="avg-conf" style="color:var(--text-card-title)">–</div>
                </div>
                <div class="glass-card p-4">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1" id="lbl-rr">平均風報比</div>
                    <div class="text-3xl font-black" id="avg-rr" style="color:var(--text-card-title)">–</div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="flex gap-2" id="filter-tabs">
                <button data-filter="all"     class="filter-tab active px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-all">全部</button>
                <button data-filter="execute" class="filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-execute">進行中</button>
                <button data-filter="waiting" class="filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all" id="ftab-waiting">等待中</button>
            </div>

            <!-- Cards Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="watchlist-grid">
                <div class="col-span-full py-20 text-center animate-pulse text-zinc-600">Loading watch radar...</div>
            </div>

        </div>
    </main>

    <!-- Report Modal (reused) -->
    <div id="report-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-8 hidden">
        <div class="border border-zinc-200 dark:border-zinc-800 w-full max-w-5xl h-full rounded-2xl flex flex-col shadow-2xl overflow-hidden" style="background-color: var(--bg-card)">
            <div class="h-14 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-6">
                <h3 class="font-bold flex items-center gap-2" style="color: var(--text-main)">
                    <i data-lucide="file-text" class="w-4 h-4 text-emerald-500"></i> Audit Report
                </h3>
                <button id="close-modal" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-200 dark:border-zinc-800">CLOSE [ESC]</button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto" style="background-color: var(--bg-card)"></div>
        </div>
    </div>

    <!-- Debug Console -->
    <div id="debug-console" class="fixed bottom-0 left-64 right-0 border-t border-zinc-200 dark:border-zinc-800 p-4 z-50 hidden font-mono text-[10px]" style="background-color: var(--bg-main); color: var(--text-main)">
        <div class="flex items-center justify-between mb-2 pb-1 border-b border-zinc-200 dark:border-zinc-900">
            <div class="flex items-center gap-2"><i data-lucide="terminal" class="w-3 h-3 text-green-500"></i><span class="font-bold uppercase tracking-widest text-[9px]">SYSTEM LOGS</span></div>
            <button onclick="document.getElementById('debug-console').classList.add('hidden')"><i data-lucide="x" class="w-3 h-3"></i></button>
        </div>
        <div id="log-output" class="space-y-1 max-h-80 overflow-y-auto custom-scrollbar"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="i18n.js?v=1.1.9"></script>
    <script>
    lucide.createIcons();

    // ── Theme ───────────────────────────────────────────���──────────
    let currentTheme = localStorage.getItem('dash_theme') || 'dark';
    function initTheme() {
        document.documentElement.setAttribute('data-theme', currentTheme);
        currentTheme === 'dark'
            ? document.documentElement.classList.add('dark')
            : document.documentElement.classList.remove('dark');
        const ic = document.getElementById('theme-icon');
        if (ic) { ic.setAttribute('data-lucide', currentTheme === 'dark' ? 'moon' : 'sun'); lucide.createIcons(); }
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('dash_theme', currentTheme);
        initTheme();
    });
    initTheme();

    // ── Lang ───────────────────────────────────────────────────────
    let currentLang = localStorage.getItem('dash_lang') || 'zh';

    function applyTranslations() {
        if (!window.i18n) return;
        const t  = window.i18n[currentLang];
        const wl = t.watchlist || {};
        const nav = t.nav || {};
        if (!t.watchlist) return; // old i18n cache — skip, loadWatchlist still runs

        document.getElementById('lang-text').textContent = currentLang === 'zh' ? 'English' : '繁體中文';

        // Header
        document.getElementById('page-title').textContent    = wl.title;
        document.getElementById('page-subtitle').textContent = wl.subtitle;
        document.getElementById('refresh-label').textContent = currentLang === 'zh' ? '更新' : 'Refresh';

        // Summary labels
        document.getElementById('lbl-active').textContent  = wl.active_label;
        document.getElementById('lbl-waiting').textContent = wl.waiting_label;
        document.getElementById('lbl-conf').textContent    = wl.avg_conf;
        document.getElementById('lbl-rr').textContent      = wl.avg_rr;

        // Filter tabs
        document.getElementById('ftab-all').textContent     = wl.filter_all;
        document.getElementById('ftab-execute').textContent = wl.filter_active;
        document.getElementById('ftab-waiting').textContent = wl.filter_waiting;

        // Nav items
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key.startsWith('nav_')) {
                const k = key.replace('nav_', '');
                if (nav[k]) el.textContent = nav[k];
            }
        });
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('dash_lang', currentLang);
        applyTranslations();
        loadWatchlist();
    });
    applyTranslations();

    // ── Logs ───────────────────────────────────────────────────────
    function logToUI(msg, type = 'info') {
        const out = document.getElementById('log-output');
        const line = document.createElement('div');
        const color = type === 'error' ? 'text-red-500' : type === 'warn' ? 'text-yellow-500' : 'text-zinc-500';
        line.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> <span class="${color}">${msg}</span>`;
        out.appendChild(line);
    }
    document.getElementById('show-logs').addEventListener('click', () =>
        document.getElementById('debug-console').classList.toggle('hidden'));

    // ── Report Modal ───────────────────────────────────────────────
    async function viewReport(path) {
        if (!path || path === 'null') { alert('Report pending...'); return; }
        const modal   = document.getElementById('report-modal');
        const content = document.getElementById('report-content');
        modal.classList.remove('hidden');
        content.innerHTML = '<div class="flex items-center justify-center h-full p-20 animate-pulse text-zinc-500">Loading...</div>';
        try {
            const full = '../' + path + '?t=' + Date.now();
            if (path.endsWith('.html')) {
                content.innerHTML = `<iframe src="${full}" class="w-full h-full border-0 bg-white rounded-lg"></iframe>`;
            } else {
                const md = await (await fetch(full)).text();
                content.innerHTML = `<div class="p-8 prose prose-invert prose-zinc max-w-none text-zinc-300">${marked.parse(md)}</div>`;
            }
        } catch (e) {
            content.innerHTML = `<div class="p-10 text-center text-red-500">Failed: ${e.message}</div>`;
        }
    }
    document.getElementById('close-modal').addEventListener('click', () =>
        document.getElementById('report-modal').classList.add('hidden'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('report-modal').classList.add('hidden'); });

    // ── Filter State ───────────────────────────────────────────────
    let activeFilter = 'all';
    document.getElementById('filter-tabs').addEventListener('click', e => {
        const btn = e.target.closest('[data-filter]');
        if (!btn) return;
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-tab').forEach(b => {
            const on = b.dataset.filter === activeFilter;
            b.className = `filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all ${
                on ? 'bg-emerald-500 text-black border-emerald-500'
                   : 'border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:border-zinc-400'}`;
        });
        renderCards(window._watchlistData || [], activeFilter);
    });
    // init tab styles
    document.querySelectorAll('.filter-tab').forEach(b => {
        const on = b.dataset.filter === 'all';
        b.className = `filter-tab px-4 py-1.5 rounded-lg text-xs font-bold border transition-all ${
            on ? 'bg-emerald-500 text-black border-emerald-500'
               : 'border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:border-zinc-400'}`;
    });

    // ── Render ─────────────────────────────────────────────────────
    const DECISION_COLOR = {
        EXECUTE: 'var(--status-bullish)', BUY: 'var(--status-bullish)',
        CANCEL:  'var(--status-bearish)', HOLD: 'var(--text-muted)',
        ARCHIVE: 'var(--text-muted)',
    };

    function riskTag(risk) {
        const clean = risk.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        return `<span class="text-[9px] font-bold px-2 py-0.5 rounded bg-red-500/10 text-red-400 border border-red-500/20 whitespace-nowrap">${clean}</span>`;
    }

    function conditionRow(label, text, color = 'var(--status-bullish)') {
        return `
        <div class="flex gap-2 items-start">
            <span class="text-[9px] font-black uppercase tracking-widest mt-0.5 shrink-0 w-14" style="color:${color}">${label}</span>
            <span class="text-[10px] leading-relaxed" style="color:var(--text-main)">${text}</span>
        </div>`;
    }

    function buildCard(item) {
        const isExecute = item.decision === 'EXECUTE' || item.decision === 'BUY';
        const statusColor = DECISION_COLOR[item.decision] || 'var(--text-muted)';
        const t  = window.i18n?.[currentLang] || {};
        const wl = t.watchlist || {};
        const status  = t.status?.[item.decision] || item.decision;
        const horizon = item.time_horizon ? (t.horizon?.[item.time_horizon] || item.time_horizon) : null;

        // Entry targets block
        const tgt = item.targets || {};
        let targetHtml = '';
        if (tgt.tp || tgt.sl) {
            targetHtml = `
            <div class="flex gap-4 pt-3 border-t border-zinc-200 dark:border-zinc-900/50">
                ${tgt.tp ? `<div><p class="text-[8px] text-zinc-600 font-bold uppercase">TP</p><p class="text-xs font-mono font-bold" style="color:var(--status-bullish)">$${tgt.tp}</p></div>` : ''}
                ${tgt.sl ? `<div class="border-l border-zinc-200 dark:border-zinc-900/50 pl-4"><p class="text-[8px] text-zinc-600 font-bold uppercase">SL</p><p class="text-xs font-mono font-bold" style="color:var(--status-bearish)">$${tgt.sl}</p></div>` : ''}
                ${tgt.entry ? `<div class="border-l border-zinc-200 dark:border-zinc-900/50 pl-4"><p class="text-[8px] text-zinc-600 font-bold uppercase">Entry</p><p class="text-xs font-mono font-bold" style="color:var(--status-binary)">${tgt.entry}</p></div>` : ''}
            </div>`;
        } else if (tgt.watch || tgt.entry) {
            const val = tgt.watch || tgt.entry;
            const lbl = tgt.watch ? 'Watch' : 'Entry';
            targetHtml = `
            <div class="pt-3 border-t border-zinc-200 dark:border-zinc-900/50">
                <p class="text-[8px] text-zinc-600 font-bold uppercase">${lbl}</p>
                <p class="text-xs font-mono font-bold" style="color:var(--status-binary)">${val}</p>
            </div>`;
        }

        // Watch conditions block (entry_A / entry_B / entry_C)
        let condHtml = '';
        if (item.watch_conditions) {
            const entries = Object.entries(item.watch_conditions);
            condHtml = `
            <div class="mt-4 pt-4 border-t border-zinc-200 dark:border-zinc-900/50 space-y-2">
                <p class="text-[9px] font-black text-yellow-500 uppercase tracking-widest flex items-center gap-1">
                    <i data-lucide="crosshair" class="w-3 h-3"></i> ${wl.entry_triggers || '進場觸發條件'}
                </p>
                ${entries.map(([k, v]) => conditionRow(k.toUpperCase(), v, 'var(--status-binary)')).join('')}
            </div>`;
        }

        // Key risks
        let risksHtml = '';
        if (item.key_risks && item.key_risks.length) {
            risksHtml = `
            <div class="mt-4 pt-4 border-t border-zinc-200 dark:border-zinc-900/50">
                <p class="text-[9px] font-black text-red-500 uppercase tracking-widest mb-2 flex items-center gap-1">
                    <i data-lucide="shield-alert" class="w-3 h-3"></i> ${wl.key_risks || 'Key Risks'}
                </p>
                <div class="flex flex-wrap gap-1.5">${item.key_risks.map(riskTag).join('')}</div>
            </div>`;
        }

        // Meta row (R/R, confidence, horizon)
        const metaItems = [
            item.rr_ratio    ? `<div><span class="text-[8px] text-zinc-600 font-bold uppercase block">${wl.rr_label || 'R/R'}</span><span class="text-sm font-mono font-bold" style="color:var(--text-card-title)">${item.rr_ratio}x</span></div>` : '',
            item.avg_confidence ? `<div><span class="text-[8px] text-zinc-600 font-bold uppercase block">${wl.conf_label || 'Conf'}</span><span class="text-sm font-mono font-bold" style="color:var(--text-card-title)">${Math.round(item.avg_confidence * 100)}%</span></div>` : '',
            horizon ? `<div><span class="text-[8px] text-zinc-600 font-bold uppercase block">${wl.horizon_label || 'Horizon'}</span><span class="text-sm font-bold" style="color:var(--text-card-title)">${horizon}</span></div>` : '',
            item.position_pct != null && item.position_pct > 0 ? `<div><span class="text-[8px] text-zinc-600 font-bold uppercase block">${wl.size_label || 'Size'}</span><span class="text-sm font-mono font-bold" style="color:var(--text-card-title)">${Math.round(item.position_pct * 100)}%</span></div>` : '',
        ].filter(Boolean).join('');

        const statusGlow = isExecute ? 'glow-green' : '';

        return `
        <div class="glass-card p-6 flex flex-col gap-0 ${statusGlow} hover:border-zinc-500/50 transition-all">
            <!-- Header -->
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h4 class="text-3xl font-black tracking-tighter" style="color:var(--text-card-title)">${item.ticker}</h4>
                    <p class="text-[10px] text-zinc-500 font-mono">${item.time}</p>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <span class="px-2 py-1 rounded text-[10px] font-black border"
                        style="background:color-mix(in srgb,${statusColor},transparent 90%);border-color:color-mix(in srgb,${statusColor},transparent 75%);color:${statusColor}">
                        ${status}
                    </span>
                    ${item.da_filed ? `<span class="text-[8px] px-1.5 py-0.5 rounded bg-violet-500/10 text-violet-400 border border-violet-500/20 font-bold">${wl.da_filed || 'DA Filed'}</span>` : ''}
                </div>
            </div>

            <!-- Score + Meta -->
            <div class="flex items-end justify-between mb-2">
                <div>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-1">${wl.model_score || 'Model Score'}</p>
                    <p class="text-4xl font-bold tracking-tighter" style="color:var(--text-card-title)">${item.score}</p>
                </div>
                <div class="flex gap-4">${metaItems}</div>
            </div>

            ${targetHtml}
            ${condHtml}
            ${risksHtml}

            <!-- Footer -->
            <div class="mt-4 pt-3 border-t border-zinc-200 dark:border-zinc-900/50 flex justify-end">
                <button onclick="viewReport('${item.report_url}')"
                    class="flex items-center gap-2 text-[10px] font-bold px-3 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 hover:bg-emerald-500 hover:text-black hover:border-emerald-500 transition-all">
                    <i data-lucide="file-text" class="w-3 h-3"></i> ${wl.view_report || 'View Report'}
                </button>
            </div>
        </div>`;
    }

    function renderCards(items, filter) {
        const grid = document.getElementById('watchlist-grid');
        const filtered = items.filter(item => {
            if (filter === 'execute') return item.decision === 'EXECUTE' || item.decision === 'BUY';
            if (filter === 'waiting') return item.watch_conditions || (item.targets?.watch && item.decision !== 'EXECUTE');
            return true;
        });

        if (!filtered.length) {
            const noItems = (window.i18n?.[currentLang]?.watchlist?.no_items) || 'No items match this filter.';
            grid.innerHTML = `<div class="col-span-full py-20 text-center text-zinc-600">${noItems}</div>`;
            return;
        }
        grid.innerHTML = filtered.map(buildCard).join('');
        lucide.createIcons();
    }

    // ── Load ───────────────────────────────────────────────────────
    async function loadWatchlist() {
        logToUI('Loading watchlist data...');
        try {
            const data = await (await fetch('data.json?t=' + Date.now())).json();
            document.getElementById('last-update').textContent = `SYNC: ${data.last_updated}`;

            const watchItems = (data.recent_analysis || []).filter(a => a.on_watchlist);
            window._watchlistData = watchItems;

            // Summary counts
            const execCount = watchItems.filter(a => a.decision === 'EXECUTE' || a.decision === 'BUY').length;
            const waitCount = watchItems.filter(a => a.watch_conditions || (a.targets?.watch && a.decision !== 'EXECUTE')).length;
            document.getElementById('count-execute').textContent = execCount;
            document.getElementById('count-waiting').textContent = waitCount;

            const validConf = watchItems.filter(a => a.avg_confidence != null);
            document.getElementById('avg-conf').textContent = validConf.length
                ? Math.round(validConf.reduce((s, a) => s + a.avg_confidence, 0) / validConf.length * 100) + '%'
                : '–';

            const validRR = watchItems.filter(a => a.rr_ratio != null);
            document.getElementById('avg-rr').textContent = validRR.length
                ? (validRR.reduce((s, a) => s + a.rr_ratio, 0) / validRR.length).toFixed(2) + 'x'
                : '–';

            renderCards(watchItems, activeFilter);
            logToUI(`Watchlist loaded: ${watchItems.length} items`);
        } catch (e) {
            logToUI(e.message, 'error');
            document.getElementById('watchlist-grid').innerHTML =
                `<div class="col-span-full glass-card p-10 text-center text-red-500">${e.message}</div>`;
        }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadWatchlist);
    loadWatchlist();
    </script>
</body>
</html>
