<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background with AUGUR oracle gradient -->
  <rect x="0" y="0" width="24" height="24" rx="5" fill="url(#bg)"/>
  <!-- Inner diamond (rotated square) -->
  <path d="M12 4 L20 12 L12 20 L4 12 Z" fill="#ecfdf5" stroke="#052e16" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Compass cross -->
  <path d="M12 7 L12 17 M7 12 L17 12" stroke="#065f46" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Augur's eye (concentric pupil) -->
  <circle cx="12" cy="12" r="2.4" fill="#065f46"/>
  <circle cx="12" cy="12" r="0.95" fill="#fef3c7"/>
</svg>
