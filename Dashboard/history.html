<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | Audit History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=1.1.9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex min-h-screen transition-all overflow-hidden font-inter" data-page="history">

    <!-- Sidebar (populated by UI.renderSidebar) -->
    <aside id="sidebar" class="w-64 border-r border-zinc-200 dark:border-zinc-900 flex flex-col fixed h-full transition-all"></aside>

    <main class="ml-64 flex-1 flex flex-col h-screen">
        <!-- Header -->
        <header class="h-16 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-8 sticky top-0 backdrop-blur-md z-10 transition-all">
            <h2 class="text-lg font-bold" data-i18n="nav_history">決策審查歷史</h2>
            <div class="flex items-center gap-4">
                <span id="market-status-text" class="text-xs font-bold text-zinc-400">--</span>
                <div class="h-4 w-px bg-zinc-200 dark:bg-zinc-900"></div>
                <span id="last-update" class="text-[10px] text-zinc-500 font-mono">SYNCING...</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6" id="audit-grid-full">
                <!-- Large Card Grid -->
                <div class="col-span-full py-20 text-center animate-pulse text-zinc-600">Loading analysis vault...</div>
            </div>
        </div>
    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-8 hidden">
        <div class="border border-zinc-200 dark:border-zinc-800 w-full max-w-5xl h-full rounded-2xl flex flex-col shadow-2xl overflow-hidden" style="background-color: var(--bg-card)">
            <div class="h-14 border-b border-zinc-200 dark:border-zinc-900 flex items-center justify-between px-6">
                <h3 class="font-bold flex items-center gap-2" style="color: var(--text-main)">
                    <i data-lucide="file-text" class="w-4 h-4 text-emerald-500"></i>
                    Audit Report
                </h3>
                <button id="close-modal" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-200 dark:border-zinc-800">CLOSE [ESC]</button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto" style="background-color: var(--bg-card)"></div>
        </div>
    </div>

    <!-- Debug Console -->
    <div id="debug-console" class="fixed bottom-0 left-64 right-0 border-t border-zinc-200 dark:border-zinc-800 p-4 transition-all z-50 hidden font-mono text-[10px]" style="background-color: var(--bg-main); color: var(--text-main)">
        <div class="flex items-center justify-between mb-2 pb-1 border-b border-zinc-200 dark:border-zinc-900">
            <div class="flex items-center gap-2">
                <i data-lucide="terminal" class="w-3 h-3 text-green-500"></i>
                <span class="font-bold uppercase tracking-widest text-[9px]" data-i18n="nav_logs">SYSTEM LOGS</span>
            </div>
            <button onclick="document.getElementById('debug-console').classList.add('hidden')" class="hover:text-white transition-colors">
                <i data-lucide="x" class="w-3 h-3"></i>
            </button>
        </div>
        <div id="log-output" class="space-y-1 max-h-80 overflow-y-auto custom-scrollbar"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="i18n.js?v=1.1.9"></script>
    <script src="utils.js?v=1.1.9"></script>
    <script src="components.js?v=1.1.9"></script>
    <script src="script.js?v=1.1.9"></script>
</body>
</html>
