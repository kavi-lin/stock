<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資委員會 | Audit History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex min-h-screen bg-black text-zinc-100 overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-zinc-800 flex flex-col fixed h-full bg-black">
        <div class="p-6 flex items-center gap-3">
            <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
                <i data-lucide="activity" class="text-black w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">AI 委員會</h1>
        </div>

        <nav class="flex-1 px-4 space-y-1">
            <a href="index.html" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                <span data-i18n="nav_dash">總體儀表板</span>
            </a>
            <a href="sector.html" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all">
                <i data-lucide="pie-chart" class="w-4 h-4"></i>
                <span data-i18n="nav_sector">產業掃描</span>
            </a>
            <a href="news.html" class="sidebar-item flex items-center gap-3 px-3 py-2 rounded-md transition-all">
                <i data-lucide="newspaper" class="w-4 h-4"></i>
                <span data-i18n="nav_news">即時新聞</span>
            </a>
            <a href="history.html" class="sidebar-item active flex items-center gap-3 px-3 py-2 rounded-md transition-all">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                <span data-i18n="nav_history">決策歷史</span>
            </a>
        </nav>

        <div class="p-4 border-t border-zinc-800 space-y-2">
            <button id="lang-toggle" class="w-full flex items-center justify-between px-3 py-2 rounded-md hover:bg-zinc-900 transition-all text-xs font-bold text-zinc-400">
                <span id="lang-text">繁體中文</span>
                <i data-lucide="languages" class="w-3 h-3"></i>
            </button>
            <button id="show-logs" class="w-full flex items-center justify-between px-3 py-2 rounded-md hover:bg-zinc-900 transition-all text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">
                <span>System Logs</span>
                <i data-lucide="terminal" class="w-3 h-3"></i>
            </button>
            <div class="pt-2 px-3 text-[8px] text-zinc-700 font-mono tracking-widest border-t border-zinc-900/50 mt-2">
                V1.1.0.260412_10:55:03
            </div>
        </div>
    </aside>

    <main class="ml-64 flex-1 flex flex-col h-screen">
        <!-- Header -->
        <header class="h-16 border-b border-zinc-800 flex items-center justify-between px-8 sticky top-0 bg-black/50 backdrop-blur-md z-10">
            <h2 class="text-lg font-bold" data-i18n="nav_history">決策審查歷史</h2>
            <div class="flex items-center gap-4">
                <span id="market-status-text" class="text-xs font-bold">--</span>
                <div class="h-4 w-px bg-zinc-800"></div>
                <span id="last-update" class="text-[10px] text-zinc-500 font-mono">SYNCING...</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6" id="audit-grid-full">
                <!-- Large Card Grid -->
                <div class="col-span-full py-20 text-center animate-pulse text-zinc-600">Loading analysis vault...</div>
            </div>
        </div>
    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-8 hidden">
        <div class="bg-zinc-950 border border-zinc-800 w-full max-w-5xl h-full rounded-2xl flex flex-col shadow-2xl overflow-hidden">
            <div class="h-14 border-b border-zinc-900 flex items-center justify-between px-6 bg-zinc-950/50">
                <h3 class="font-bold flex items-center gap-2">
                    <i data-lucide="file-text" class="w-4 h-4 text-emerald-500"></i>
                    Audit Report
                </h3>
                <button id="close-modal" class="text-zinc-500 hover:text-white transition-all text-xs font-bold px-3 py-1 rounded-lg border border-zinc-900">CLOSE [ESC]</button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto bg-zinc-950"></div>
        </div>
    </div>

    <!-- Debug Console -->
    <div id="debug-console" class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-900 p-4 font-mono text-[10px] text-zinc-400 z-50 max-h-80 overflow-y-auto hidden">
        <div class="flex justify-between items-center mb-2 border-b border-zinc-900 pb-1">
            <span class="font-bold text-emerald-500">SYSTEM LOGS</span>
            <button onclick="document.getElementById('debug-console').classList.add('hidden')" class="hover:text-white">CLOSE [X]</button>
        </div>
        <div id="log-output" class="space-y-1"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
